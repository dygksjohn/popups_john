apiVersion: v1
kind: ConfigMap
metadata:
  name: pupoo-ai-config
  namespace: pupoo
data:
  PORT: "8000"
  PUPOO_AI_SERVICE_NAME: "pupoo-ai"
  PUPOO_AI_LOG_LEVEL: "INFO"
  PUPOO_AI_BACKEND_BASE_URL: "http://pupoo-backend:80"
  PUPOO_AI_BACKEND_TIMEOUT_SECONDS: "15"
  # 금지어(RAG+watsonx LLM)는 정책/임베딩 검색이 길어질 수 있어 충분히 대기한다.
  # 사용자 요청에 따라 최대 90초까지 기다리도록 설정한다.
  PUPOO_AI_MODERATION_TIMEOUT_SECONDS: "90"
  PUPOO_AI_POSTER_PROVIDER: "openai"
  PUPOO_AI_POSTER_OPENAI_MODEL: "dall-e-3"
  PUPOO_AI_POSTER_OPENAI_BASE_URL: "https://api.openai.com/v1"
  PUPOO_AI_POSTER_DEFAULT_WIDTH: "400"
  PUPOO_AI_POSTER_DEFAULT_HEIGHT: "847"
  PUPOO_AI_POSTER_STORAGE_PREFIX: "posters/generated"
  PUPOO_AI_POSTER_TIMEOUT_SECONDS: "20"
  STORAGE_S3_BUCKET: "pupoo-storage"
  STORAGE_S3_REGION: "ap-northeast-2"
  STORAGE_S3_KEY_PREFIX: "uploads"
  APP_STORAGE_CDN_BASE_URL: "https://cdn.pupoo.site"
  PUPOO_AI_AWS_REGION: "us-east-1"
  PUPOO_AI_BEDROCK_MODEL_ID: "us.amazon.nova-lite-v1:0"
  # watsonx (비밀 아닌 엔드포인트·모델 ID)
  PUPOO_AI_WATSONX_URL: "https://us-south.ml.cloud.ibm.com"
  PUPOO_AI_WATSONX_REGION: "us-south"
  PUPOO_AI_WATSONX_LLM_ID: "meta-llama/llama-3-3-70b-instruct"
  PUPOO_AI_WATSONX_EMBEDDING_MODEL_ID: "ibm/granite-embedding-278m-multilingual"
  PUPOO_AI_WATSONX_EMBEDDING_DIM: "768"
  # Milvus(Standalone): proxy Service DNS를 명시한다.
  # 예) Helm release가 my-milvus, namespace가 milvus면:
  #     my-milvus-milvus.milvus.svc.cluster.local
  # 값은 운영 클러스터의 실제 Service 이름으로 교체해야 한다.
  PUPOO_AI_MILVUS_HOST: "REPLACE_ME_MILVUS_PROXY_DNS"
  PUPOO_AI_MILVUS_PORT: "19530"
  PUPOO_AI_MILVUS_TLS: "false"
  PUPOO_AI_MILVUS_COLLECTION: "policy_vectors"

  # 정책 TXT -> DB 키워드 병합 -> 임베딩을 위해 RDS를 사용합니다.
  # Spring 우선순위: AI 설정에서 db_url/db_host/user/name 중 값이 있으면 사용됩니다.
  # (password는 secret으로 분리)
  PUPOO_AI_DB_HOST: "pupoodb.c50c2i048hc8.ap-northeast-2.rds.amazonaws.com"
  PUPOO_AI_DB_PORT: "3306"
  PUPOO_AI_DB_USER: "pupoo"
  PUPOO_AI_DB_NAME: "pupoodb"
